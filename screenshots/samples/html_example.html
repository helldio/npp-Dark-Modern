<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark+ Modern Theme Test Page</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
        }
        h1 {
            color: #569cd6;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Notepad++ Theme Showcase</h1>
        <p>Testing syntax highlighting for HTML tags, attributes, and styles.</p>
    </header>
    <main>
        <section id="features" class="container">
            <h2>Supported Features</h2>
            <ul>
                <li data-status="supported">High contrast and vibrant colors</li>
                <li data-status="supported">Matches VS Code Dark+ Modern theme</li>
                <li data-status="pending">Custom styling for exotic languages</li>
            </ul>
        </section>
        <form action="/submit" method="post">
            <label for="name-input">Your Name:</label>
            <input type="text" id="name-input" name="user_name" placeholder="Enter name..." required>
            <button type="submit">Submit</button>
        </form>
    </main>
    <footer>

    </footer>

</html>
